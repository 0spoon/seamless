{{define "login"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in &middot; Seamless</title>
<link rel="stylesheet" href="/console/static/console.css">
<script>
(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('seamless-theme')||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
</head>
<body>
<div class="login-wrap dotgrid">
  <form class="login-card" method="post" action="/console/login">
    <h1><span class="live-dot"></span> Seamless console</h1>
    <p>Paste the static API key to sign in. It is exchanged for a cookie scoped to this console.</p>
    {{if .Error}}<div class="login-err">{{icon "triangle-alert"}}<span>{{.Error}}</span></div>{{end}}
    <label for="key">API key</label>
    <input id="key" name="key" type="password" autocomplete="off" autofocus placeholder="mcp.api_key">
    <input type="hidden" name="next" value="{{.Next}}">
    <button class="btn primary" type="submit">Sign in</button>
  </form>
</div>
</body>
</html>
{{end}}

{{define "content"}}{{end}}
