{{define "layout"}}<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.Title}} &middot; Seamless</title>
<link rel="stylesheet" href="/console/static/console.css">
<script>
/* Apply the saved theme before first paint (default dark) to avoid a flash. */
(function(){try{document.documentElement.setAttribute('data-theme',localStorage.getItem('seamless-theme')||'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();
</script>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><span class="dot"></span> Seamless</div>
    <div class="brand-by">by <span>0spoon</span></div>
    <nav class="nav">
      <a href="/console/" class="{{if eq .Active "overview"}}active{{end}}">Overview</a>
      <a href="/console/sessions" class="{{if eq .Active "sessions"}}active{{end}}">Sessions <span class="count">{{.Nav.Sessions}}</span></a>
      <a href="/console/memories" class="{{if eq .Active "memories"}}active{{end}}">Memories <span class="count">{{.Nav.Memories}}</span></a>
      <a href="/console/retrieval" class="{{if eq .Active "retrieval"}}active{{end}}">Retrieval</a>
      <a href="/console/tasks" class="{{if eq .Active "tasks"}}active{{end}}">Tasks <span class="count">{{.Nav.Tasks}}</span></a>
      <a href="/console/gardener" class="{{if eq .Active "gardener"}}active{{end}}">Gardener <span class="count">{{.Nav.Proposals}}</span></a>
      <a href="/console/settings" class="{{if eq .Active "settings"}}active{{end}}">Settings</a>
    </nav>
    <div class="side-foot">
      <button class="btn small theme-toggle" type="button" id="theme-toggle" aria-label="Toggle theme">Light theme</button>
      <form method="post" action="/console/logout">
        <button class="btn small" type="submit">Sign out</button>
      </form>
    </div>
  </aside>
  <main class="main">
    {{template "content" .}}
  </main>
</div>
<button id="live-pill" type="button" hidden>new activity &middot; refresh</button>
<script>
(function () {
  if (!window.EventSource) return;
  var pill = document.getElementById('live-pill');
  var dot = document.querySelector('.brand .dot');
  var n = 0;
  var es = new EventSource('/console/events');
  es.onopen = function () { if (dot) dot.classList.add('on'); };
  es.onmessage = function () {
    n++;
    if (pill) {
      pill.textContent = n + ' new event' + (n > 1 ? 's' : '') + ' · refresh';
      pill.hidden = false;
    }
  };
  es.onerror = function () { if (dot) dot.classList.remove('on'); };
  if (pill) pill.onclick = function () { location.reload(); };
})();
(function () {
  var btn = document.getElementById('theme-toggle');
  if (!btn) return;
  var root = document.documentElement;
  function label() { btn.textContent = root.getAttribute('data-theme') === 'dark' ? 'Light theme' : 'Dark theme'; }
  label();
  btn.onclick = function () {
    var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try { localStorage.setItem('seamless-theme', next); } catch (e) {}
    label();
  };
})();
</script>
{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
