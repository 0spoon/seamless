{{define "content"}}
{{with .Data}}
<div class="crumb"><a href="/console/memories">Memories</a> <span class="faint">/</span> <b>{{.Name}}</b> {{copyBtn .Name}}</div>

<div class="detail-head">
  <div class="title-row">
    <span class="tile">{{icon "database"}}</span>
    <h1>{{.Name}}</h1>
    <span class="badge {{if eq .Status "active"}}ok{{else if eq .Status "superseded"}}warn{{end}}">{{.Status}}</span>
    <span class="kind">{{.Kind}}</span>
    <span class="chip-parent">{{icon "git-branch"}}{{if .Project}}{{.Project}}{{else}}global{{end}}</span>
  </div>
  {{if .Description}}<div class="desc">{{.Description}}</div>{{end}}
</div>

<article class="card peek-entity detail-body">{{template "detail-body" .}}</article>
{{end}}
{{end}}
