{{define "content"}}
{{with .Data}}
<div class="crumb"><a href="/console/tasks">Tasks</a> <span class="faint">/</span> <b>{{shortID .ID}}</b> {{copyBtn .ID}}</div>

<div class="detail-head">
  <div class="title-row">
    <span class="tile">{{icon "list-checks"}}</span>
    <h1>{{.Title}}</h1>
    <span class="badge {{taskTone .Status}}">{{.Status}}</span>
    {{if .PlanSlug}}<span class="kind">plan:{{.PlanSlug}}</span>{{end}}
    <span class="chip-parent">{{icon "git-branch"}}{{if .Project}}{{.Project}}{{else}}global{{end}}</span>
  </div>
</div>

<article class="card peek-entity detail-body">{{template "detail-body" .}}</article>
{{end}}
{{end}}
