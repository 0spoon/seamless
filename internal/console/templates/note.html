{{define "content"}}
{{with .Data}}
<div class="crumb"><a href="/console/notes">Notes</a> <span class="faint">/</span> <b>{{.Title}}</b> {{copyBtn .Title}}</div>

<div class="detail-head">
  <div class="title-row">
    <span class="tile">{{icon "file-text"}}</span>
    <h1>{{.Title}}</h1>
    <span class="kind">note</span>
    <span class="chip-parent">{{icon "git-branch"}}{{if .Project}}{{.Project}}{{else}}inbox{{end}}</span>
  </div>
  {{if .Description}}<div class="desc">{{.Description}}</div>{{end}}
</div>

<article class="card peek-entity detail-body">{{template "detail-body" .}}</article>
{{end}}
{{end}}
