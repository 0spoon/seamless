# goreleaser config: cross-compiled release binaries for tagged versions.
# Triggered by .github/workflows/release.yml on a v* tag; dry-run locally with
# `make release-snapshot`. The version comes from the git tag (leading v
# stripped), injected as main.version -- see cmd/seamlessd/main.go.
version: 2

project_name: seamless

builds:
  # No CGO anywhere (pure-Go SQLite), so plain cross-compilation covers every
  # target. Windows joins darwin + linux now that the Claude Code hooks emit
  # exec form (no shell string) and the daemon runs under a per-user Scheduled
  # Task; goreleaser appends .exe automatically for the windows targets.
  - id: seamlessd
    main: ./cmd/seamlessd
    binary: seamlessd
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  # seam has no link-time metadata; it reports the server's version via
  # `seam status` instead of carrying its own.
  - id: seam
    main: ./cmd/seam
    binary: seam
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: [-s -w]
    mod_timestamp: "{{ .CommitTimestamp }}"

# One archive per platform holding both binaries, plus the files a fresh
# install needs: the example config `make install` seeds from, and the portable
# Claude Code/Codex skills embedded by seamlessd. They are also bundled as
# ordinary skill packages so a release archive is self-describing and supports
# manual installation without a clone.
archives:
  - formats: [tar.gz]
    # zip on Windows: the PowerShell installer (docs/install.ps1) uses
    # Expand-Archive, and .tar.gz is not a native Windows format. Everything
    # else stays tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - seamless.yaml.example
      - src: internal/skills/assets/seam-onboard/SKILL.md
        dst: seam-onboard
        strip_parent: true
      - src: internal/skills/assets/seam-onboard/agents/openai.yaml
        dst: seam-onboard/agents
        strip_parent: true
      - src: internal/skills/assets/seam-research/SKILL.md
        dst: seam-research
        strip_parent: true
      - src: internal/skills/assets/seam-research/agents/openai.yaml
        dst: seam-research/agents
        strip_parent: true

checksum:
  name_template: checksums.txt

# Sign checksums.txt so it proves AUTHENTICITY, not just integrity.
#
# Every archive is verified against checksums.txt by both installers, so
# checksums.txt is the root of that trust -- and until now it was fetched from
# the same origin as the archives with nothing binding it to this project. An
# attacker who could publish a release or MITM the host could swap the tarball
# and the manifest together and every checksum would still match (audit M3).
#
# Keyless (Sigstore): the signing identity is this repository's release workflow,
# proven by the GitHub OIDC token, and the short-lived certificate is logged in
# the public transparency log. There is no private key to generate, store as a
# secret, rotate, or leak -- which is the whole reason to prefer it here, since
# the alternative is a single maintainer holding a long-lived key.
#
# Requires `id-token: write` on the release job and the cosign binary; both are
# wired in .github/workflows/release.yml. Local `make release-snapshot` passes
# --skip=sign, because keyless signing off a CI runner would try to open a
# browser for an interactive OIDC flow.
signs:
  - cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    output: true
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"

# The canonical installer scripts and their Sigstore bundles ride along as
# release assets so `seamlessd update` can fetch script + signature from one
# immutable, atomically published origin and verify (via the sigstore-go
# verifier compiled into the daemon) before piping anything to a shell (audit
# M3). The bundles are produced by the "Sign installer scripts" step in
# release.yml, which runs before goreleaser; humans keep using the
# thereisnospoon.org one-liners, which serve the same bytes.
release:
  extra_files:
    - glob: docs/install
    - glob: docs/install.ps1
    - glob: sigs/install.sigstore.json
    - glob: sigs/install.ps1.sigstore.json

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs'
      - '^chore'
      - '^ci'
      - '^test'
