# goreleaser config: cross-compiled release binaries for tagged versions.
# Triggered by .github/workflows/release.yml on a v* tag; dry-run locally with
# `make release-snapshot`. The version comes from the git tag (leading v
# stripped), injected as main.version -- see cmd/seamlessd/main.go.
version: 2

project_name: seamless

builds:
  # No CGO anywhere (pure-Go SQLite), so plain cross-compilation covers every
  # target. Windows joins darwin + linux now that the Claude Code hooks emit
  # exec form (no shell string) and the daemon runs under a per-user Scheduled
  # Task; goreleaser appends .exe automatically for the windows targets.
  - id: seamlessd
    main: ./cmd/seamlessd
    binary: seamlessd
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.buildDate={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"

  # seam has no link-time metadata; it reports the server's version via
  # `seam status` instead of carrying its own.
  - id: seam
    main: ./cmd/seam
    binary: seam
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags: [-s -w]
    mod_timestamp: "{{ .CommitTimestamp }}"

# One archive per platform holding both binaries, plus the files a fresh
# install needs: the example config `make install` seeds from, and the Claude
# Code skills the curl installer drops into ~/.claude/skills/ (bundled here so
# a no-clone install can still deliver them -- each lands at <name>/SKILL.md in
# the archive).
archives:
  - formats: [tar.gz]
    # zip on Windows: the PowerShell installer (docs/install.ps1) uses
    # Expand-Archive, and .tar.gz is not a native Windows format. Everything
    # else stays tar.gz.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - seamless.yaml.example
      - src: scripts/seam-onboard-skill/SKILL.md
        dst: seam-onboard
        strip_parent: true
      - src: scripts/seam-research-skill/SKILL.md
        dst: seam-research
        strip_parent: true

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs'
      - '^chore'
      - '^ci'
      - '^test'
