name: Release

# Cut a release by pushing a version tag: `git tag v0.3.0 && git push origin
# v0.3.0`. goreleaser cross-compiles seamlessd + seam (see .goreleaser.yaml)
# and publishes the archives, checksums, and changelog as a GitHub release.
on:
  push:
    tags: ["v*"]

permissions:
  # contents: write publishes the release; id-token: write mints the short-lived
  # OIDC token cosign exchanges for a keyless signing certificate, which is what
  # binds checksums.txt to this workflow in this repo (audit M3). Without it,
  # `cosign sign-blob` would fall back to an interactive browser flow and hang.
  contents: write
  id-token: write

# Third-party actions are pinned to full commit SHAs, not mutable major tags.
# This job holds `contents: write` and the release GITHUB_TOKEN, so a retagged
# or compromised upstream action would run in the context that builds and
# publishes what every user downloads. The trailing comment is the human-
# readable version; dependabot (.github/dependabot.yml) bumps both together.
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Full history: the changelog is built from the commits since the
      # previous tag, which a shallow checkout cannot see.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      # goreleaser's `signs:` stage and the installer-signing step below both
      # shell out to this binary. The version is pinned to the v2 line: the
      # action's default (cosign v3) refuses to emit the detached .sig/.pem
      # pair that goreleaser's `signs:` stage produces for checksums.txt and
      # that docs/install + docs/install.ps1 verify (v3 only writes bundles).
      # v2 also supports --new-bundle-format, so the installer-script bundles
      # below are byte-compatible either way. Lifting this pin means moving
      # checksums.txt signing to bundle output and teaching both installers
      # to verify bundles first.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.4"

      # Sign the two canonical installer scripts as Sigstore bundles (protobuf
      # bundle format: signature + Fulcio certificate + Rekor entry in one
      # self-contained JSON). goreleaser publishes the scripts and bundles as
      # release assets (release.extra_files in .goreleaser.yaml), where
      # `seamlessd update` fetches both and verifies with its compiled-in
      # sigstore-go verifier before piping the script to a shell (audit M3).
      # The verify-blob calls re-check each bundle against the exact identity
      # the daemon and the installers pin, so a format or identity regression
      # fails the release here rather than on users' machines.
      - name: Sign installer scripts (keyless)
        run: |
          mkdir -p sigs
          for script in install install.ps1; do
            cosign sign-blob --yes --new-bundle-format=true \
              --bundle "sigs/${script}.sigstore.json" "docs/${script}"
            cosign verify-blob \
              --bundle "sigs/${script}.sigstore.json" \
              --certificate-identity-regexp '^https://github.com/0spoon/seamless/\.github/workflows/release\.yml@refs/tags/v' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "docs/${script}"
          done

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
