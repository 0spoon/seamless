name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# One run per ref: a new push supersedes the in-flight check for the same branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # fetch-depth: 0 because `make docs-check` runs scripts/changelog.sh
      # --check, which rebuilds the changelog from every v* tag and the commit
      # ranges between them -- the default shallow, tagless checkout sees
      # neither (release.yml fetches full history for the same reason).
      # `make build` (`git rev-parse`) and `make fmt-check` (`git ls-files`)
      # also need the checkout's .git.
      # Pinned to full commit SHAs (see release.yml) so a retagged upstream
      # action cannot change what runs here; the comment is the readable
      # version and dependabot bumps both together.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      # go-version-file reads go.mod's `toolchain` line, so the security
      # toolchain floor (go1.25.12, audit M1) is set in exactly one place.
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      # Pinned to the version developers run locally. The v1 line is load-bearing,
      # not just reproducibility: .golangci.yml is v1-format (run:/linters-settings:)
      # and golangci-lint v2 refuses to parse it. `go install pkg@version` resolves
      # outside the current module, so this cannot touch go.mod/go.sum.
      - name: Install golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # `make vulncheck` requires the binary rather than skipping when it is
      # absent, so this install is what makes the known-vulnerability gate real
      # in CI. Pinned to the version developers run locally, same as
      # golangci-lint above; `pkg@version` resolves outside the module, so it
      # cannot touch go.mod/go.sum. Findings track the live vuln.go.dev DB, not
      # this pin, so a new advisory still turns CI red without a bump here.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      # build + vet + fmt-check + lint + vulncheck + test-race. CGO stays enabled (the default
      # on this runner) because -race requires it; the no-CGO rule is about the
      # shipped binary's deps, not the test toolchain.
      - name: make check
        run: make check
