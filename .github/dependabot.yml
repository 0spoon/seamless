version: 2

# Actions in ci.yml and release.yml are pinned to full commit SHAs (audit L10),
# which closes the retagging hole but freezes them: a pin nobody updates is an
# unpatched dependency wearing a security hat. Dependabot is the other half of
# that trade -- it rewrites the SHA *and* the trailing `# vX.Y.Z` comment
# together, so the pin stays both immutable and current.
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(ci)"

  # Go modules on the same cadence: `make vulncheck` fails the build on a
  # reachable advisory, and this is what keeps that from being the first
  # warning we get.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(deps)"
